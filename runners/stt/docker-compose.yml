services:
  cohere-transcribe:
    build: .
    ports:
      - "8201:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ipc: host
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command:
      - --model
      - CohereLabs/cohere-transcribe-03-2026
      - --gpu-memory-utilization
      - "0.45"
volumes:
  huggingface-cache:
