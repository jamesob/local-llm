# GLM-5.2 NVFP4-REAP-594B — vLLM serving on 4× RTX PRO 6000 (Blackwell, sm120, TP4)
# Config: DCP4 + MTP5 + FLASHINFER_MLA_SPARSE_SM120 + b12x MoE.
# Measured single-stream: ~80 t/s codegen (MTP5 accept ~4.0-4.6), ~240k KV context.
#
# Model:  madeby561/GLM-5.2-Int8Mix-NVFP4-REAP-594B  (public on HF) — mount it at /mnt/models,
#         or override MODEL to wherever you put it.
# Image:  voipmonitor/vllm eldritch fork (b12x, sm120). Boot:  docker compose up -d
#
# Speed/context knobs:
#   DCP_SIZE=1  ->  ~90K ctx  / ~95-112 t/s  (max single-stream speed)
#   DCP_SIZE=2  ->  ~153K ctx / ~86 t/s      (this file's default — more context for ~10% decode)
#   DCP_SIZE=4  ->  ~277K ctx / ~56 t/s
#   Set MAX_MODEL_LEN to your boot log's "GPU KV cache size: N tokens" (DCP2 pool ~152,960 here).
#
services:
  glm52:
    image: ${IMAGE:-voipmonitor/vllm:eldritch-enlightenment-v8722ac7-b12x8ce61f9-cu132-20260629}
    container_name: glm52
    network_mode: host
    ipc: host
    shm_size: 32g
    gpus: all
    init: true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 1048576
        hard: 1048576
      stack: 67108864
    volumes:
      - ${MODEL_DIR:-/home/james/storage/models}:/models:ro
      - ${HF_HOME:-/home/james/storage/huggingface}:/root/.cache/huggingface
      - vllm-glm52-594b:/cache
    environment:
      CUDA_VISIBLE_DEVICES: "0,1,2,3"
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_DEVICE_MAX_CONNECTIONS: "32"
      CUTE_DSL_ARCH: sm_120a
      OMP_NUM_THREADS: "16"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      SAFETENSORS_FAST_GPU: "1"
      NCCL_IB_DISABLE: "1"
      NCCL_P2P_LEVEL: SYS
      NCCL_PROTO: LL,LL128,Simple
      VLLM_USE_AOT_COMPILE: "${VLLM_USE_AOT_COMPILE:-1}"
      VLLM_USE_BREAKABLE_CUDAGRAPH: "0"
      VLLM_USE_MEGA_AOT_ARTIFACT: "${VLLM_USE_MEGA_AOT_ARTIFACT:-1}"
      VLLM_USE_FLASHINFER_SAMPLER: "1"
      VLLM_USE_B12X_FP8_GEMM: "1"
      VLLM_USE_B12X_MOE: "1"
      VLLM_USE_B12X_SPARSE_INDEXER: "1"
      VLLM_USE_V2_MODEL_RUNNER: "1"
      VLLM_ENABLE_PCIE_ALLREDUCE: "1"
      VLLM_PCIE_ALLREDUCE_BACKEND: b12x
      VLLM_PCIE_ONESHOT_ALLREDUCE_MAX_SIZE: 64KB
      B12X_DENSE_SPLITK_TURBO: "1"
      B12X_W4A16_TC_DECODE: "1"
      B12X_MOE_FORCE_A16: "1"
      VLLM_CACHE_DIR: /cache/jit/vllm
      TRITON_CACHE_DIR: /cache/jit/triton
      TORCH_EXTENSIONS_DIR: /cache/jit/torch_extensions
      TORCHINDUCTOR_CACHE_DIR: /cache/jit/torchinductor
      FLASHINFER_WORKSPACE_BASE: /cache/jit/flashinfer
      XDG_CACHE_HOME: /cache/jit
      MODEL: ${MODEL:-/models/GLM-5.2-Int8Mix-NVFP4-REAP-594B}
      SERVED_MODEL_NAME: GLM-5.2
      PORT: "5000"
      TP_SIZE: "4"
      DCP_SIZE: "${DCP_SIZE:-4}"
      MTP_TOKENS: "${MTP_TOKENS:-5}"
      DRAFT_SAMPLE_METHOD: "${DRAFT_SAMPLE_METHOD:-probabilistic}"
      # ATTN_BACKEND: "${ATTN_BACKEND:-B12X_MLA_SPARSE}"
      ATTN_BACKEND: "${ATTN_BACKEND:-FLASHINFER_MLA_SPARSE_SM120}"
      GPU_MEMORY_UTILIZATION: "${GPU_MEMORY_UTILIZATION:-0.95}"
      MAX_MODEL_LEN: "${MAX_MODEL_LEN:-245000}"
      MAX_NUM_SEQS: "${MAX_NUM_SEQS:-8}"
      MAX_NUM_BATCHED_TOKENS: "8192"
      MAX_CUDAGRAPH_CAPTURE_SIZE: "${MAX_CUDAGRAPH_CAPTURE_SIZE:-32}"
      GLM52_INDEX_TOPK_PATTERN: FFFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSS
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        unset NCCL_GRAPH_FILE NCCL_GRAPH_DUMP_FILE VLLM_B12X_MLA_EXTEND_MAX_CHUNKS
        SPEC_ARGS=()
        if [ "$${MTP_TOKENS}" != "0" ]; then
          SPEC_ARGS=(--speculative-config "{\"method\":\"mtp\",\"num_speculative_tokens\":$${MTP_TOKENS},\"moe_backend\":\"b12x\",\"draft_sample_method\":\"$${DRAFT_SAMPLE_METHOD}\"}")
        fi
        exec vllm serve "$${MODEL}" \
          --served-model-name "$${SERVED_MODEL_NAME}" \
          --host 0.0.0.0 \
          --port "$${PORT}" \
          --trust-remote-code \
          --tensor-parallel-size "$${TP_SIZE}" \
          --decode-context-parallel-size "$${DCP_SIZE}" \
          --dcp-comm-backend ag_rs \
          --dcp-kv-cache-interleave-size 1 \
          --quantization compressed-tensors \
          --kv-cache-dtype fp8 \
          --attention-backend "$${ATTN_BACKEND}" \
          --moe-backend b12x \
          --load-format fastsafetensors \
          -cc.pass_config.fuse_allreduce_rms=True \
          --gpu-memory-utilization "$${GPU_MEMORY_UTILIZATION}" \
          --max-model-len "$${MAX_MODEL_LEN}" \
          --max-num-seqs "$${MAX_NUM_SEQS}" \
          --max-num-batched-tokens "$${MAX_NUM_BATCHED_TOKENS}" \
          --max-cudagraph-capture-size "$${MAX_CUDAGRAPH_CAPTURE_SIZE}" \
          --async-scheduling \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --enable-auto-tool-choice \
          --tool-call-parser glm47 \
          --reasoning-parser glm45 \
          --default-chat-template-kwargs '{"reasoning_effort":"high"}' \
          --hf-overrides "{\"use_index_cache\":true,\"index_topk_pattern\":\"$${GLM52_INDEX_TOPK_PATTERN}\"}" \
          "$${SPEC_ARGS[@]}"

volumes:
  vllm-glm52-594b:
